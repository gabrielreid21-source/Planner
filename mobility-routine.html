<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mobility">
<meta name="theme-color" content="#FFF9F0">
<title>Daily Mobility Routine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { height:100%; }
  body {
    font-family:'Inter',-apple-system,sans-serif;
    background:#FFF9F0;
    color:#3D3D4E;
    min-height:100%;
    padding:max(12px,env(safe-area-inset-top)) 16px max(12px,env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }

  .header { text-align:center; padding:8px 0 12px; }
  .header h1 { font-size:22px; font-weight:800; color:#5A4E8C; margin-bottom:2px; }
  .header p { font-size:12px; color:#8E8E93; }

  .phase-tabs {
    display:flex; gap:4px; justify-content:center; margin-bottom:14px;
    position:sticky; top:0; z-index:10; background:#FFF9F0; padding:6px 0;
  }
  .phase-tab {
    padding:8px 16px; border-radius:20px; font-size:12px; font-weight:600;
    border:1.5px solid #E8DDD0; background:white; color:#8E8E93; cursor:pointer;
    transition:all .2s;
  }
  .phase-tab:active { transform:scale(.95); }
  .phase-tab.active { color:white; border-color:transparent; }
  .phase-tab[data-phase="warmup"].active { background:#FFB5C2; }
  .phase-tab[data-phase="mobility"].active { background:#B5A8D6; }
  .phase-tab[data-phase="cooldown"].active { background:#95D4B5; }

  .exercise-list { max-width:700px; margin:0 auto; }

  .exercise-card {
    background:white; border-radius:16px; margin-bottom:10px;
    border:1px solid #F0E8DD; overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.04);
    transition:all .2s;
  }
  .exercise-card.completed { opacity:.5; }
  .exercise-card.completed .card-header { text-decoration:line-through; }
  .exercise-card.active-exercise { border-color:#B5A8D6; box-shadow:0 2px 16px rgba(181,168,214,.3); }

  .card-header {
    display:flex; align-items:center; gap:10px; padding:14px 16px;
    cursor:pointer;
  }
  .card-num {
    width:30px; height:30px; border-radius:10px; display:flex;
    align-items:center; justify-content:center; font-weight:700;
    font-size:13px; color:white; flex-shrink:0;
  }
  .warmup .card-num { background:#FFB5C2; }
  .mobility .card-num { background:#B5A8D6; }
  .cooldown .card-num { background:#95D4B5; }

  .card-info { flex:1; min-width:0; }
  .card-title { font-weight:700; font-size:14px; color:#3D3D4E; }
  .card-target { font-size:11px; color:#B0A8C0; margin-top:1px; }

  .card-time {
    font-size:11px; font-weight:600; padding:4px 10px;
    border-radius:12px; background:#F8F4EE; color:#8E8E93; flex-shrink:0;
  }

  .card-body { display:none; padding:0 16px 16px; }
  .card-body.open { display:block; }

  .card-illustration {
    background:#FBF7F2; border-radius:12px; padding:16px;
    margin-bottom:12px; text-align:center;
  }
  .card-illustration svg { max-width:100%; height:auto; }

  .card-steps {
    font-size:13px; line-height:1.7; color:#5A5A6E; margin-bottom:12px;
  }
  .card-steps ol { padding-left:18px; }
  .card-steps li { margin-bottom:4px; }
  .card-steps .tip {
    background:#FFF3CD; border-radius:8px; padding:8px 10px;
    font-size:12px; margin-top:8px; color:#8B7000;
  }

  .card-actions {
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .btn {
    padding:10px 18px; border-radius:12px; font-size:12px; font-weight:600;
    border:none; cursor:pointer; display:flex; align-items:center; gap:6px;
    transition:all .15s;
  }
  .btn:active { transform:scale(.95); }
  .btn-timer { background:#B5A8D6; color:white; }
  .btn-timer.running { background:#FF7B7B; }
  .btn-video { background:#F0EBFF; color:#5A4E8C; }
  .btn-done { background:#E8F8EE; color:#2D8B5A; }
  .btn-done.is-done { background:#2D8B5A; color:white; }

  .timer-display {
    font-size:28px; font-weight:800; font-variant-numeric:tabular-nums;
    color:#5A4E8C; text-align:center; padding:8px 0; display:none;
  }
  .timer-display.show { display:block; }

  .global-progress {
    max-width:700px; margin:0 auto 14px;
    background:white; border-radius:12px; padding:12px 16px;
    border:1px solid #F0E8DD;
  }
  .progress-top { display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; }
  .progress-top span:first-child { font-weight:600; color:#5A4E8C; }
  .progress-top span:last-child { color:#8E8E93; }
  .progress-track { height:6px; background:#F0E8DD; border-radius:3px; overflow:hidden; }
  .progress-fill {
    height:100%; border-radius:3px; transition:width .4s;
    background:linear-gradient(90deg,#FFB5C2,#B5A8D6,#95D4B5);
  }

  .footer {
    text-align:center; padding:16px 0; font-size:11px; color:#B0A8C0;
  }
  .footer a { color:#5A4E8C; text-decoration:none; font-weight:600; }

  .reset-all {
    display:block; margin:8px auto; padding:8px 20px; border-radius:8px;
    border:1px solid #E8DDD0; background:white; color:#8E8E93;
    font-size:11px; cursor:pointer;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🌿 Daily Mobility Flow</h1>
  <p>25 minutes · No equipment · Low impact</p>
</div>

<div class="phase-tabs">
  <div class="phase-tab active" data-phase="all" onclick="filterPhase('all')">All</div>
  <div class="phase-tab" data-phase="warmup" onclick="filterPhase('warmup')">Warm-Up</div>
  <div class="phase-tab" data-phase="mobility" onclick="filterPhase('mobility')">Mobility</div>
  <div class="phase-tab" data-phase="cooldown" onclick="filterPhase('cooldown')">Cool-Down</div>
</div>

<div class="global-progress">
  <div class="progress-top"><span id="progLabel">Ready to start</span><span id="progCount">0/12</span></div>
  <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="exercise-list" id="exerciseList"></div>

<button class="reset-all" onclick="resetAll()">Reset progress</button>

<div class="footer">
  <p>Designed for your 12:30 & 13:00 break blocks</p>
  <p style="margin-top:4px">Tap any exercise to expand · Videos open YouTube</p>
</div>

// State
let completed = {};
let timers = {};
let activeFilter = 'all';

try {
  const saved = localStorage.getItem('mob_done_' + new Date().toISOString().slice(0,10));
  if (saved) completed = JSON.parse(saved);
} catch(e) {}

function saveCompleted() {
  try { localStorage.setItem('mob_done_' + new Date().toISOString().slice(0,10), JSON.stringify(completed)); } catch(e) {}
}

function updateProgress() {
  const done = Object.keys(completed).length;
  const total = exercises.length;
  const pct = Math.round((done/total)*100);
  document.getElementById('progCount').textContent = done + '/' + total;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = done === total ? '✨ All done! Great work!' : done + ' of ' + total + ' completed';
}

function filterPhase(phase) {
  activeFilter = phase;
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.toggle('active', t.dataset.phase === phase));
  renderList();
}

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  body.classList.toggle('open');
}

function toggleDone(id, e) {
  e.stopPropagation();
  if (completed[id]) delete completed[id];
  else completed[id] = true;
  saveCompleted();
  renderList();
}

function startTimer(id, seconds, e) {
  e.stopPropagation();
  const btn = document.getElementById('tbtn-'+id);
  const display = document.getElementById('timer-'+id);
  const card = document.getElementById('card-'+id);

  if (timers[id]) {
    clearInterval(timers[id].interval);
    delete timers[id];
    btn.textContent = '▶ Start Timer';
    btn.classList.remove('running');
    display.classList.remove('show');
    card.classList.remove('active-exercise');
    return;
  }

  let remaining = seconds;
  display.classList.add('show');
  card.classList.add('active-exercise');
  btn.textContent = '⏹ Stop';
  btn.classList.add('running');

  function tick() {
    const m = Math.floor(remaining/60);
    const s = remaining%60;
    display.textContent = m + ':' + String(s).padStart(2,'0');
    if (remaining <= 0) {
      clearInterval(timers[id].interval);
      delete timers[id];
      display.textContent = '✅ Done!';
      btn.textContent = '▶ Start Timer';
      btn.classList.remove('running');
      card.classList.remove('active-exercise');
      completed[id] = true;
      saveCompleted();
      setTimeout(() => { display.classList.remove('show'); renderList(); }, 1500);
      try { navigator.vibrate && navigator.vibrate([200,100,200]); } catch(e) {}
    }
    remaining--;
  }
  tick();
  timers[id] = { interval: setInterval(tick, 1000) };
}

function renderList() {
  const list = document.getElementById('exerciseList');
  const filtered = activeFilter === 'all' ? exercises : exercises.filter(ex => ex.phase === activeFilter);

  list.innerHTML = filtered.map(ex => {
    const isDone = !!completed[ex.id];
    return `
    <div class="exercise-card ${ex.phase} ${isDone?'completed':''}" id="card-${ex.id}">
      <div class="card-header" onclick="toggleCard(${ex.id})">
        <div class="card-num">${ex.id}</div>
        <div class="card-info">
          <div class="card-title">${ex.name}</div>
          <div class="card-target">${ex.target}</div>
        </div>
        <div class="card-time">${ex.time}</div>
      </div>
      <div class="card-body" id="body-${ex.id}">
        <div class="card-illustration">${ex.svg}</div>
        <div class="card-steps">
          <ol>${ex.steps.map(s => '<li>'+s+'</li>').join('')}</ol>
          ${ex.tip ? '<div class="tip">💡 '+ex.tip+'</div>' : ''}
        </div>
        <div class="timer-display" id="timer-${ex.id}"></div>
        <div class="card-actions">
          <button class="btn btn-timer" id="tbtn-${ex.id}" onclick="startTimer(${ex.id},${ex.seconds},event)">▶ Start Timer</button>
          <a class="btn btn-video" href="${ex.video}" target="_blank" onclick="event.stopPropagation()">📹 Watch Video</a>
          <button class="btn btn-done ${isDone?'is-done':''}" onclick="toggleDone(${ex.id},event)">${isDone?'✓ Done':'Mark Done'}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  updateProgress();
}

function resetAll() {
  completed = {};
  saveCompleted();
  Object.values(timers).forEach(t => clearInterval(t.interval));
  timers = {};
  renderList();
}

renderList();
</script>
